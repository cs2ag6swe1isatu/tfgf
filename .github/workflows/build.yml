name: "Build Project"
on: [push]

jobs:
  export_game:
    runs-on: ubuntu-latest
    name: Export Game
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Dotnet Build
        run: |
          dotnet restore
          dotnet build

      - name: Download and Setup Godot
        run: |
          # 1. Create template directory
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable.mono
          
          # 2. Download and Unzip Engine
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_mono_linux_x86_64.zip
          unzip -q Godot_v4.6-stable_mono_linux_x86_64.zip
          
          # 3. CRITICAL: Move the binary AND the GodotSharp folder together
          # This prevents the "Assemblies not found" crash
          mv Godot_v4.6-stable_mono_linux_x86_64/Godot_v4.6-stable_mono_linux.x86_64 ./godot_engine
          mv Godot_v4.6-stable_mono_linux_x86_64/GodotSharp ./GodotSharp
          chmod +x ./godot_engine
          
          # 4. Download and setup Templates
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_mono_export_templates.tpz
          unzip -q Godot_v4.6-stable_mono_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.stable.mono/

      - name: Manual Godot Export
        run: |
          mkdir -p builds/windows
          mkdir -p builds/linux
          
          # We use --verbose to see exactly what Godot is doing if it fails
          ./godot_engine --headless --verbose --path . --export-release "Windows Desktop" ./builds/windows/game.exe
          ./godot_engine --headless --verbose --path . --export-release "Linux" ./builds/linux/game.x86_64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-builds
          path: builds/
