name: "Build Project"
on: [push]

jobs:
  export_game:
    runs-on: ubuntu-latest
    name: Export Game
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Dotnet Build
        run: |
          dotnet restore
          dotnet build

      # --- CACHE LOGIC START ---
      - name: Cache Godot Engine and Templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ./godot_engine
            ./GodotSharp
            ~/.local/share/godot/export_templates/4.6.stable.mono
          # The key ensures if you change versions, it re-downloads
          key: ${{ runner.os }}-godot-4.6-mono-v1

      - name: Download Godot (if not cached)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable.mono
          
          # Download Engine
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_mono_linux_x86_64.zip
          unzip -q Godot_v4.6-stable_mono_linux_x86_64.zip
          mv Godot_v4.6-stable_mono_linux_x86_64/Godot_v4.6-stable_mono_linux.x86_64 ./godot_engine
          mv Godot_v4.6-stable_mono_linux_x86_64/GodotSharp ./GodotSharp
          chmod +x ./godot_engine
          
          # Download Templates
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_mono_export_templates.tpz
          unzip -q Godot_v4.6-stable_mono_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.stable.mono/
      # --- CACHE LOGIC END ---

      - name: Manual Godot Export
        run: |
          mkdir -p builds/windows
          mkdir -p builds/linux
          
          # Export Windows
          ./godot_engine --headless --path . --export-release "Windows Desktop" ./builds/windows/game.exe
          # Export Linux
          ./godot_engine --headless --path . --export-release "Linux" ./builds/linux/game.x86_64
          
          # ZIP them up so they are easy to share
          cd builds
          zip -r ../game_windows.zip windows/
          zip -r ../game_linux.zip linux/
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            game_windows.zip
            game_linux.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-builds
          path: builds/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            builds/windows/game.exe
            builds/linux/game.x86_64
